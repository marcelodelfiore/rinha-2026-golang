worker_processes auto;

events {
    worker_connections 2048;
}

http {
    access_log off;

    upstream api_backend {
        server api1:8080;
        server api2:8080;
        keepalive 32;
    }

    server {
        listen 9999;

        location / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;

            proxy_buffering off;
        }
    }
}
